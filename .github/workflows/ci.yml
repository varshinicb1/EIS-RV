name: RĀMAN Studio CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pytest pytest-cov pytest-asyncio
    - name: Syntax check
      run: python -c "
        import ast, glob, sys
        fails = []
        for f in glob.glob('src/**/*.py', recursive=True):
            try: ast.parse(open(f).read())
            except SyntaxError as e: fails.append(f'{f}: {e}')
        print(f'{len(glob.glob(\"src/**/*.py\", recursive=True))} Python files checked')
        if fails:
            print('\n'.join(fails)); sys.exit(1)
        "
    - name: Run tests
      run: pytest tests/ -v --tb=short || true

  cpp-build:
    name: C++ Engine Build & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install C++ deps
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libeigen3-dev pybind11-dev
    - name: Configure & Build
      run: |
        cd engine_core && mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . -j$(nproc)
    - name: Run C++ tests
      run: |
        cd engine_core/build
        ./test_eis_solver
    - name: Verify Python bindings
      run: |
        cd engine_core/build
        python3 -c "import raman_core; print(f'{len([x for x in dir(raman_core) if not x.startswith(\"_\")])} exports OK')"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Build
      run: |
        cd src/frontend
        npm ci --ignore-scripts || npm install
        npm run build || true

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install linting tools
      run: pip install ruff
    - name: Run ruff
      run: ruff check src/ --ignore E501 || true

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [python-test, cpp-build, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: raman-studio:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
