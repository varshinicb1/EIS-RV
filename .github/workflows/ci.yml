name: RĀMAN Studio CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  python-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pytest-asyncio

      - name: Syntax check
        run: |
          python - <<'PY'
          import ast, glob, sys
          fails = []
          for pattern in ("src/**/*.py", "tests/**/*.py", "scripts/**/*.py"):
              for f in glob.glob(pattern, recursive=True):
                  try:
                      ast.parse(open(f, encoding="utf-8").read())
                  except SyntaxError as e:
                      fails.append(f"{f}: {e}")
          if fails:
              print("\n".join(fails))
              sys.exit(1)
          print("Python syntax OK across src/, tests/, scripts/")
          PY

      - name: Run tests with coverage
        run: |
          pytest --ignore=tests/integration -v --tb=short \
            --cov=src/backend --cov=src/ai_engine \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=45

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  cpp-build:
    name: C++ engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev pybind11-dev

      - name: Configure & build
        run: |
          cd engine_core
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DRAMAN_BUILD_TESTS=ON
          cmake --build . -j$(nproc)

      - name: Run C++ unit tests
        run: |
          cd engine_core/build
          ctest --output-on-failure

      - name: Verify Python bindings import
        run: |
          cd engine_core/build
          python3 -c "import raman_core; print(f'{len([x for x in dir(raman_core) if not x.startswith(\"_\")])} exports OK')"

  frontend:
    name: Frontend build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: src/frontend
        run: npm ci --legacy-peer-deps --ignore-scripts || npm install --legacy-peer-deps

      - name: Test (vitest)
        working-directory: src/frontend
        run: npm run test

      - name: Build
        working-directory: src/frontend
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/ --ignore E501

  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [python-test, cpp-build, frontend, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: raman-studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
