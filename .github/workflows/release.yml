name: Release — RĀMAN Studio installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (used for manual builds; otherwise the pushed tag is used)'
        required: false
        type: string

permissions:
  contents: write   # creates/updates the GitHub Release with installer artifacts

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
            artifacts: |
              dist-electron/*.AppImage
              dist-electron/*.deb
          - os: windows-2022
            label: windows-x64
            artifacts: |
              dist-electron/*Setup*.exe
              dist-electron/*.msi
              dist-electron/*.blockmap
          - os: macos-13
            label: macos
            artifacts: |
              dist-electron/*.dmg
              dist-electron/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Frontend deps (renderer is built by `prebuild` script in package.json,
      # but we'd rather see install / build steps separately in the log).
      - name: Install frontend deps
        working-directory: src/frontend
        run: |
          npm ci --legacy-peer-deps --ignore-scripts || npm install --legacy-peer-deps

      - name: Test frontend
        working-directory: src/frontend
        run: npm run test
        # macOS GitHub runners can be flaky on jsdom networking — keep the
        # test gate strict on Linux, advisory elsewhere.
        continue-on-error: ${{ matrix.os != 'ubuntu-22.04' }}

      - name: Build renderer
        working-directory: src/frontend
        run: npm run build

      - name: Install Electron deps
        run: npm ci --ignore-scripts || npm install

      - name: Backend syntax + tests (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pytest-asyncio
          python -m pytest --ignore=tests/integration -q

      # ── Code signing ──────────────────────────────────────────────────
      # Windows: secret CSC_LINK is base64 of the .pfx; CSC_KEY_PASSWORD is
      # the cert password. macOS: APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD +
      # APPLE_TEAM_ID for notarization. If any of these are missing we
      # build *unsigned* — useful for early dogfooding but flagged as such
      # in the release notes.
      - name: Mark unsigned build (Windows)
        if: matrix.os == 'windows-2022' && env.CSC_LINK == ''
        shell: bash
        run: echo "RAMAN_UNSIGNED=true" >> $GITHUB_ENV
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Mark unsigned build (macOS)
        if: matrix.os == 'macos-13' && env.APPLE_ID == ''
        shell: bash
        run: echo "RAMAN_UNSIGNED=true" >> $GITHUB_ENV
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}

      # ── electron-builder ──────────────────────────────────────────────
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (Windows)
        if: matrix.os == 'windows-2022'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build (macOS)
        if: matrix.os == 'macos-13'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Publish to GitHub Release ─────────────────────────────────────
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: raman-studio-${{ matrix.label }}
          path: ${{ matrix.artifacts }}
          retention-days: 30
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.zip' -o -name 'latest*.yml' -o -name '*.blockmap' \) -exec cp -v {} dist/ \;
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RĀMAN Studio ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
