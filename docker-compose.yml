version: '3.8'

services:
  # VANL API Server
  api:
    build: .
    container_name: vanl-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vanl:vanl_password@db:5432/vanl
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./vanl:/app/vanl
      - vanl_data:/app/data
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - vanl-network

  # PostgreSQL Database (for future use)
  db:
    image: postgres:15-alpine
    container_name: vanl-db
    environment:
      - POSTGRES_USER=vanl
      - POSTGRES_PASSWORD=vanl_password
      - POSTGRES_DB=vanl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - vanl-network

  # Redis Cache (for future use)
  redis:
    image: redis:7-alpine
    container_name: vanl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vanl-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vanl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./vanl/frontend:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - vanl-network

volumes:
  postgres_data:
  redis_data:
  vanl_data:
  nginx_logs:

networks:
  vanl-network:
    driver: bridge
