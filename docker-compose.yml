version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: raman_admin
      POSTGRES_PASSWORD: raman_secure_password
      POSTGRES_DB: raman_enterprise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - raman-network

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - raman-network

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8000
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://raman_admin:raman_secure_password@db:5432/raman_enterprise
      - REDIS_URL=redis://redis:6379/0
      # - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      - db
      - redis
    networks:
      - raman-network

  sentinel:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "dev_tools/sentinel/watcher.py"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://raman_admin:raman_secure_password@db:5432/raman_enterprise
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./dev_tools/sentinel:/app/dev_tools/sentinel
      - ./engine_core/include:/app/engine_core/include
    depends_on:
      - db
      - backend
    networks:
      - raman-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - raman-network

networks:
  raman-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
