[tool.pytest.ini_options]
# Make ``import src.backend...`` work without installing the package.
# Tests live alongside source so we add the repo root to sys.path.
pythonpath = ["."]

# Default test discovery: tests/ plus engine_core/tests/Python helpers.
# Integration tests (require ROS / hardware) are excluded from CI by passing
# --ignore=tests/integration on the command line.
testpaths = [
    "tests",
    "src/backend/research/tests",
]
addopts = "--strict-markers"

# Quiet known third-party deprecation warnings without hiding genuine ones.
filterwarnings = [
    "ignore::DeprecationWarning:passlib.*",
    "ignore::pydantic.PydanticDeprecatedSince20:.*",
]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    "engine_core/build",
    "build",
    "dist-electron",
    "node_modules",
    ".venv",
    ".venv_new",
    "src/frontend/node_modules",
]

[tool.ruff.lint]
# Long-line rule is opinionated; everything else stays strict on real
# correctness issues. The style rules below are common in our patterns:
#   E402 — late imports in server.py (router-include order matters)
#   E701/E702 — small one-liners with semicolons in imperative scripts
#   E741 — `l`, `I` are fine when used locally for indices in math code
#   E722 — bare except is occasionally correct in cleanup paths
ignore = ["E501", "E402", "E701", "E702", "E741", "E722"]

[tool.coverage.run]
source = ["src/backend", "src/ai_engine"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "src/backend/licensing/license_server_stub.py",  # dev-only stub
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
