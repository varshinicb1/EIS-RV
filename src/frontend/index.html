<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RĀMAN Studio — desktop electrochemical analysis (EIS, CV, GCD)" />

    <!--
      Content Security Policy
      ------------------------
      The desktop app talks to a local FastAPI sidecar on 127.0.0.1 and may opt
      in to NVIDIA NIM. Nothing else should be reachable. unsafe-inline on
      style-src is required for inline `style={{ ... }}` props used by the
      React components; unsafe-eval has been removed.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob:;
      connect-src 'self' http://127.0.0.1:8000 ws://127.0.0.1:8000 https://integrate.api.nvidia.com;
      worker-src 'self' blob:;
      object-src 'none';
      frame-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <title>RĀMAN Studio</title>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
